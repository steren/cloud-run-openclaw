apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: openclaw
  annotations:
    run.googleapis.com/scalingMode: manual
    run.googleapis.com/manualInstanceCount: "1"
    run.googleapis.com/invoker-iam-disabled: 'true'
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
    spec:
      volumes:
      - name: openclaw-config
        csi:
          driver: gcsfuse.run.googleapis.com
          volumeAttributes:
            bucketName: steren-openclaw-bucket
      containers:
      - image: alpine/openclaw:latest
        name: gateway
        volumeMounts:
        - name: openclaw-config
          mountPath: /home/node/.openclaw
        command:
          - node
          - /app/dist/index.js
          - gateway
          - run
        env:       
        - name: GEMINI_API_KEY
          value: "YOUR_API_KEY"          
        # 🛡️ Recommended securely passing API Key via Google Cloud Secret Manager:
        # - name: GEMINI_API_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       key: latest
        #       name: gemini-api-key-secret # The name of your secret in GCP Secret Manager
        ports:
          - containerPort: 18789

        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
